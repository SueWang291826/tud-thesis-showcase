  F5RF:
    name_cn: "顶板"
    name_en: "Roof Slab"
    elevation_mm: 24600
    guid: ""
    is_public: false
    role: "roof_slab"

# --- IFC Schema Assumptions ---
ifc:
  expected_schema: "IFC2X3"
  length_unit: "millimeter"
  coordinate_precision: 0.01

# --- Geometry Check Parameters ---
geometry:
  # Bounding box size thresholds (mm)
  min_bbox_dimension: 1.0          # Objects smaller than this are suspicious
  max_bbox_dimension: 500000.0     # Objects larger than this are suspicious
  degenerate_threshold: 0.1        # Bbox dimension below this is degenerate
  # Maximum number of faces before flagging as heavy geometry
  heavy_geometry_face_threshold: 50000

# --- Processing ---
processing:
  # Maximum elements to process (-1 = all)
  max_elements: -1
  # Whether to attempt geometry extraction (can be slow for large files)
  extract_geometry: true
  # Timeout per element for geometry extraction (seconds)
  geometry_timeout: 30

# --- Visualization ---
visualization:
  dpi: 150
  figure_format: "png"
  figure_format_vector: "svg"
  save_svg: true
  color_palette: "Set2"
  font_size: 10
