# ==============================================================================
# IFC Preprocessing Pipeline - Main Configuration
# ==============================================================================
# This configuration file controls all parameters of the preprocessing pipeline.
# Paths are relative to the project root (data-preprocessing/).

# --- Input Data ---
input:
  data_dir: "../data0"
  ifc_files:
    platform: "站台层.ifc"
    equipment: "设备层.ifc"
    concourse: "站厅层.ifc"
    traffic: "交通层.ifc"

# --- Output Paths ---
output:
  base_dir: "outputs"
  audit_dir: "outputs/audit"
  storey_dir: "outputs/storey_mapping"
  semantic_dir: "outputs/semantic"
  proxy_dir: "outputs/proxy"
  geometry_dir: "outputs/geometry"
  exports_dir: "outputs/exports"
  figures_dir: "outputs/figures"
  logs_dir: "outputs/logs"

# --- Storey Reference ---
# Known storey information from IFC inspection.
# Elevations are in millimeters (IFC native unit).
storeys:
  F0:
    name_cn: "底板层"
    name_en: "Base Slab"
    elevation_mm: -1700
    guid: "3BOnaDbWz7lvmiNoNaxVXL"
    is_public: false
    role: "structural_base"
  F1:
    name_cn: "站台层"
    name_en: "Platform"
    elevation_mm: 0
    guid: "3Zu5Bv0LOHrPC10026FoQQ"
    is_public: true
    role: "platform"
  F2:
    name_cn: "设备层"
    name_en: "Equipment"
    elevation_mm: 5300
    guid: "15Z0v90RiHrPC20026FoKR"
    is_public: false
    role: "equipment"
  F3:
    name_cn: "站厅层"
    name_en: "Concourse"
    elevation_mm: 12100
    guid: "1zJe9M6nv1ouXQgUD29hF9"
    is_public: true
    role: "concourse"
  F4:
    name_cn: "交通层"
    name_en: "Transport"
    elevation_mm: 17400
    guid: "1zJe9M6nv1ouXQgUD29hER"
    is_public: true
